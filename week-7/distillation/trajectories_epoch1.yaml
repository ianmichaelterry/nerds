# FINAL_ARTIFACT

The finished **Blade Runner (1982)** poster is a 2000×3000px portrait-orientation piece built on a near-void background of **#0A0A12**. The full-bleed hero image layers a dense Brutalist megacity silhouette — its thousand windows dotting the dark skyline in orange-red (#E8430A), cold cyan (#2BBFDE), and amber (#C4911A) — beneath a smog-choked sky that graduates from deep indigo at the horizon to absolute black at the upper corners. A trench-coated figure (Deckard's silhouette) stands in three-quarter profile at the upper-right of the composition, separated from the dark cityscape by a razor-thin **#2BBFDE** rim light at 60% opacity; his left face is warmed by amber neon halation while rain streaks — white lines at 82°, 12% opacity, 60px motion-blur — fall across the entire canvas. Neon signage fragments ("TDK" in orange, "KOSS" in cyan) glow from the mid-city layer with 24–30px Gaussian blooms, and a wobbly puddle reflection in the lower third mirrors the entire neon palette at 45% opacity. In the lower-left, the title **BLADE / RUNNER** stacks in two flush-left lines of **Eurostile Extended Bold** in warm cream (#E8E0D0) with a double-layer orange-red glow shadow (18px and 40px), carrying a subtle 2px chromatic aberration on the letter edges. Beneath it, in small amber Helvetica Neue Light tracked at 0.22em, runs the tagline **"MAN HAS MADE HIS MATCH... NOW IT'S HIS PROBLEM."** over a 68%-opacity dark underlay that guarantees legibility. The bottom strip — background #0A0A12 — holds the credit line **HARRISON FORD · RUTGER HAUER | A RIDLEY SCOTT FILM** in grey Helvetica Neue, with the studio badge **THE LADD COMPANY / WARNER BROS.** at micro weight far left. A lone **1982** year badge in Eurostile Bold amber sits at the upper-right corner. Film grain at 1.4px / 18% overlay intensity, elliptical vignette at 72% opacity, and a warm-shadow color grade (shadows pulled toward #0D0818, highlights to #F0D8B0) give the whole image the texture of a photochemical print found in a 1982 movie-house lobby — cold, neon-sick, and unmistakably *Blade Runner*.

