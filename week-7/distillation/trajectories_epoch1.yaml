
---
# Blade Runner — rollout 1/2

# Blackboard Design Session: Blade Runner (1982)

---

TICK 1: MoviePicker
  READS: NOTHING
  WRITES: movie_seed = 
    title: "Blade Runner"
    genre: sci-fi
    subgenre: neo-noir
    year: 1982
    tagline: "Man has made his match... now it's his problem."
    director: Ridley Scott
    actors: [Harrison Ford, Rutger Hauer]
    mood_keywords: [dystopian, rain-soaked, neon, existential, urban-decay]
    heat: HOT
  RATIONALE: Seeds the blackboard with all source metadata so downstream specialists have a complete, authoritative reference point.

---

TICK 2: GenrePalette
  READS: movie_seed -> genre=sci-fi/neo-noir, mood_keywords=[dystopian, rain-soaked, neon, urban-decay]
  WRITES: color_palette =
    name: "Neon Dusk"
    background: "#0A0A12"
    primary_accent: "#E8430A"
    secondary_accent: "#1ECBE1"
    tertiary_accent: "#C47FD5"
    highlight: "#F5D76E"
    shadow: "#050508"
    text_primary: "#E8E0D0"
    text_secondary: "#8899AA"
    rationale_note: "Deep near-black base; electric cyan and amber-orange neon glow for rain-reflected street light; violet for smog haze; warm ivory for title text"
    heat: HOT
  RATIONALE: Neo-noir sci-fi demands a palette built on near-blackness punctuated by neon warm and cool tones, directly evoking Los Angeles 2019's acid-rain streetscapes.

---

TICK 3: TitleParser
  READS: movie_seed -> title="Blade Runner", tagline="Man has made his match... now it's his problem.", actors=[Harrison Ford, Rutger Hauer], director=Ridley Scott
  WRITES: title_layout =
    primary_line:
      text: "BLADE"
      role: dominant_word
      weight: ultra_heavy
      tracking: 0.18em
    secondary_line:
      text: "RUNNER"
      role: dominant_word
      weight: ultra_heavy
      tracking: 0.18em
    tagline:
      text: "Man has made his match... now it's his problem."
      role: tagline
      weight: light
      tracking: 0.06em
    credits_block:
      director_line: "A RIDLEY SCOTT FILM"
      cast_line: "HARRISON FORD  RUTGER HAUER"
      production_line: "WARNER BROS. · 1982"
    heat: HOT
  RATIONALE: Splitting BLADE and RUNNER onto separate lines of equal visual weight creates a stacked monolith that anchors the vertical composition and references the original theatrical treatment.

---

TICK 4: TypefacePicker
  READS: color_palette -> text_primary="#E8E0D0", title_layout -> weight=ultra_heavy, tracking=0.18em, genre=sci-fi/neo-noir
  WRITES: typeface_spec =
    title_font:
      family: "Eurostile Extended Bold"
      style: "condensed uppercase geometric sans"
      size_primary: 112pt
      color: "#E8E0D0"
      text_shadow: "0px 0px 18px #E8430A"
      letter_spacing: "0.18em"
    tagline_font:
      family: "Futura PT Light"
      size: 14pt
      color: "#8899AA"
      letter_spacing: "0.06em"
    credits_font:
      family: "Futura PT Book"
      size: 9pt
      color: "#8899AA"
      letter_spacing: "0.12em"
      case: uppercase
    heat: HOT
  RATIONALE: Eurostile Extended is the quintessential cold-machine-age sans-serif, immediately signaling industrial futurity, while Futura's geometric neutrality keeps supporting text legible without competing with the hero title.

---

TICK 5: LayoutPicker
  READS: title_layout -> primary/secondary lines stacked, credits_block; color_palette -> background="#0A0A12"; typeface_spec -> title 112pt stacked
  WRITES: layout_template =
    canvas:
      width_px: 2000
      height_px: 3000
      aspect_ratio: "2:3 (standard theatrical one-sheet)"
    zones:
      sky_zone:
        y_range: [0, 900]
        description: "Upper third — smoggy violet-amber skyline with distant megastructure pyramids"
      hero_zone:
        y_range: [600, 2100]
        description: "Centre mass — full-silhouette figure of Deckard, trench coat, weapon raised; rain streaks overlay"
      neon_reflection_zone:
        y_range: [1800, 2400]
        description: "Lower mid — wet street surface reflecting neon cyan and orange verticals as distorted pillars"
      title_zone:
        y_range: [2050, 2350]
        description: "BLADE stacked above RUNNER, horizontally centred, sitting over the reflection zone"
        x_anchor: centre
      tagline_zone:
        y_range: [2370, 2430]
        x_anchor: centre
      credits_zone:
        y_range: [2870, 2960]
        x_anchor: centre
    compositional_rule: "Silhouette figure bleeds into title block; eye travels top-to-bottom: sky → figure → neon street → title → tagline → credits"
    heat: HOT
  RATIONALE: A portrait silhouette-over-title layout is the canonical noir one-sheet grammar — placing the figure above the title zone ensures the human (or replicant) drama dominates before the brand identity anchors the lower third.

---

TICK 6: HeroImageGen
  READS: layout_template -> zones (sky_zone, hero_zone, neon_reflection_zone); color_palette -> background="#0A0A12", primary_accent="#E8430A", secondary_accent="#1ECBE1", tertiary_accent="#C47FD5"; mood_keywords=[dystopian, rain-soaked, neon, existential]
  WRITES: hero_image_spec =
    sky_layer:
      gradient: "vertical linear from #1A0E2A (top) to #2E1A08 (horizon)"
      elements:
        - type: megastructure_pyramid
          position: [x=1400, y=300]
          size: "600px wide, 500px tall"
          color: "#1C1015"
          edge_glow: "#E8430A at 30% opacity, 8px blur"
        - type: smog_haze
          color: "#C47FD5"
          opacity: 0.18
          blur: 80px
        - type: flying_vehicle_silhouette
          position: [x=400, y=180]
          size: "90px wide"
          color: "#0A0A12"
          underbelly_light: "#F5D76E"
    rain_layer:
      stroke_color: "#8899AA"
      stroke_opacity: 0.35
      stroke_width: 0.8px
      angle_degrees: 82
      density: high
      blur: 1.2px
    hero_figure:
      subject: "Deckard silhouette — trench coat, 3/4 rear-turned, pistol raised at 45°"
      position: [x_centre=1000, y_top=620, y_bottom=2050]
      silhouette_fill: "#0D0D18"
      rim_light_left:
        color: "#1ECBE1"
        width: 4px
        blur: 12px
      rim_light_right:
        color: "#E8430A"
        width: 6px
        blur: 20px
    neon_street_layer:
      base_color: "#050508"
      reflections:
        - color: "#1ECBE1"
          x: 780
          width: 22px
          height: 320px
          blur: 14px
          opacity: 0.8
        - color: "#E8430A"
          x: 1050
          width: 34px
          height: 280px
          blur: 18px
          opacity: 0.75
        - color: "#C47FD5"
          x: 1280
          width: 16px
          height: 200px
          blur: 10px
          opacity: 0.6
      puddle_ripple_overlay: true
    heat: HOT
  RATIONALE: The split cyan-left / amber-right rim lighting on Deckard's silhouette is the visual thesis statement — human warmth versus cold machine-light — while the wet-street neon reflections echo Los Angeles 2019's signature visual language.

---

TICK 7: GrainEffect
  READS: hero_image_spec -> rain_layer, silhouette, neon reflections; color_palette -> background="#0A0A12"; layout_template -> canvas 2000×3000
  WRITES: post_processing =
    film_grain:
      type: "analog 35mm scan grain"
      intensity: 0.28
      grain_size_px: 1.4
      monochrome: false
      blend_mode: overlay
    chromatic_aberration:
      red_offset_px: [+1.5, 0]
      blue_offset_px: [-1.5, 0]
      apply_to: neon_elements_only
    vignette:
      color: "#000000"
      opacity: 0.72
      radius: 70%
      feather: 400px
    halation:
      apply_to: [neon_reflection_zone, rim_lights]
      color_inherit: true
      spread_px: 28
      opacity: 0.45
      blend_mode: screen
    scan_line_overlay:
      line_height_px: 4
      opacity: 0.04
      blend_mode: multiply
      note: "Barely visible — suggests video surveillance aesthetic without overwhelming"
    heat: HOT
  RATIONALE: Analog film grain plus halation blooms on neon elements give the poster the tangible physicality of 1982 photochemical printing while the micro chromatic aberration on neon elements reinforces the idea of reality breaking at its seams.

---

TICK 8: Critic
  READS: movie_seed [MEDIUM], color_palette [MEDIUM], title_layout [MEDIUM], typeface_spec [MEDIUM], layout_template [HOT], hero_image_spec [HOT], post_processing [HOT]
  WRITES: critique_report =
    overall_coherence: 8.5/10
    issues:
      - id: C1
        severity: medium
        description: "Eye contact / focal tension missing — Deckard is rear-turned; no face draws the viewer in. Consider adding a second, ghostly Batty face emerging from the sky zone at low opacity to create a protagonist/antagonist duality."
      - id: C2
        severity: low
        description: "Tagline text color (#8899AA) may be too muted against the near-black background at small print sizes. Recommend nudging to #AAB8C4 for legibility."
      - id: C3
        severity: low
        description: "Rutger Hauer is co-lead yet credits_block buries him equally with Ford. The poster would benefit from his name receiving identical point size to Ford's — they are already on the same credits_line, so this is satisfied. No change needed."
      - id: C4
        severity: low
        description: "Flying vehicle in sky_zone has underbelly_light=#F5D76E — warm yellow reads slightly generic sci-fi. Suggest shifting to #FFB347 (a more amber-sodium tone) for period accuracy."
    positive_notes:
      - "Palette is tonally tight and internally consistent."
      - "Eurostile Extended is exactly correct for the era and genre."
      - "Layered rain + grain + halation post-processing is production-ready."
      - "Zone-based layout gives a clear reading order."
    recommended_patches: [C1, C2, C4]
    heat: HOT
  RATIONALE: A critic cross-reads all accumulated decisions looking for internal contradictions and experiential gaps, surfacing only actionable issues rather than aesthetic preferences.

---

TICK 9: HeroImageGen
  READS: critique_report -> C1 (add Batty ghost face in sky), C4 (fix vehicle underbelly color); hero_image_spec [HOT]
  WRITES: hero_image_patch =
    patch_id: "v1.1"
