## FINAL_ARTIFACT

The finished Blade Runner (1982) one-sheet is a 2000 × 3000 px (2:3 theatrical) portrait printed on a near-black field (#0A0A12). The upper third bathes in a violet-amber smog gradient from which a vast Tyrell Corporation pyramid looms in near-invisible charcoal, its silhouette edged with a barely-there orange corona, and a spinner hovers at upper-left emitting a sodium-amber underbelly glow (#FFB347). Dissolving softly through the smog at 22% opacity — visible only when the eye lingers — is Roy Batty's rain-streaked face, fading upward like a half-remembered dream, tinted in violet-mauve and blurred at the crown. Dominating the centre, a full-length silhouette of Deckard stands in wet-trench-coat profile, pistol raised at 45°, his left flank rimmed in cool cyan (#1ECBE1, 12px halation) and his right in fierce amber-orange (#E8430A, 20px halation) — two competing natures, one body. Rain streaks at 82° saturate the entire image at 35% opacity. The lower third is a mirror-black puddle-slicked street where three neon columns — cyan, orange, violet — ripple vertically in reflection like drowned ghosts. Above this reflection, set horizontally centred in 112pt Eurostile Extended Bold at ivory (#E8E0D0) with a faint orange glow behind each letterform, the title reads BLADE on one line and RUNNER directly beneath it, each word tracked at 0.18em, the two lines forming a rectangular monolith. Below the title, in 14pt Futura PT Light at cool grey (#AAB8C4) with 0.06em tracking: *Man has made his match… now it's his problem.* The bottom strip carries "A RIDLEY SCOTT FILM / HARRISON FORD · RUTGER HAUER / WARNER BROS. · 1982" in 9pt Futura PT Book uppercase at #8899AA. Over the entire canvas sits a 28% analog film-grain overlay in screen mode, a 72% vignette fading from the corners, a gossamer scan-line texture at 4% opacity, and neon-only chromatic aberration of ±1.5px red-blue shift — making the image feel as though it has been pulled from a damaged 35mm print found in the rain.

