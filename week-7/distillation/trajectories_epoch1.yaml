      new_value: "#FFB347"
    heat: HOT
  RATIONALE: Adding Batty's dissolving face in the sky zone transforms the composition from a single-protagonist action poster into a haunted memento-mori — underscoring the film's core question of what it means to be alive.

---

TICK 10: TypefacePicker
  READS: critique_report -> C2 (tagline color too muted, nudge to #AAB8C4); typeface_spec [MEDIUM]
  WRITES: typeface_patch =
    patch_id: "v1.1"
